# CI kantor: build 6 image dari kode kustom -> push ke GHCR.
# Deploy TIDAK otomatis. Di server jalankan `paradise/bin/deploy.sh` saat mau rilis.
#
# Sekali seumur hidup setelah run pertama: buka
# https://github.com/Milize21/Paradise-task-tracker/pkgs -> tiap package ->
# Package settings -> Change visibility -> Public. Package GHCR default-nya
# private walaupun repo-nya public, dan server gagal `pull` kalau masih private.
name: paradise-build

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths-ignore:
      - "paradise/**"
      - "**/*.md"

concurrency:
  group: paradise-build
  cancel-in-progress: true

env:
  # Owner GHCR wajib huruf kecil.
  REGISTRY: ghcr.io/milize21

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Validasi compose + overlay GHCR
        run: |
          # Keduanya gitignored, jadi tidak pernah ada di checkout CI. Tanpa ini
          # `config` gagal: docker-compose.yml menunjuk env_file ./apps/api/.env
          # di 4 service. Isinya tidak dipakai — compose cuma butuh filenya ada.
          cp .env.example .env
          cp .env.example apps/api/.env
          docker compose -f docker-compose.yml config -q
          docker compose -f docker-compose.yml -f docker-compose.ghcr.yml config -q
          # Guard: service baru yang punya build: tapi lupa ditambah ke overlay akan
          # diam-diam ter-build dari source di server. Gagalkan di sini.
          missing=$(docker compose -f docker-compose.yml -f docker-compose.ghcr.yml config --format json \
            | python3 -c "import json,sys; s=json.load(sys.stdin)['services']; print(' '.join(n for n,v in s.items() if 'build' in v and not v.get('image','').startswith('ghcr.io')))")
          if [ -n "$missing" ]; then
            echo "Service tanpa image GHCR di docker-compose.ghcr.yml: $missing"
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Bake membaca compose yang sama dengan yang dipakai server, jadi context dan
      # nama image hanya ditulis di satu tempat (docker-compose.ghcr.yml).
      #
      # JANGAN pakai deployments/cli/community/build.yml di sini: context-nya
      # ../../ padahal filenya tiga tingkat di bawah root, dan bake meresolusi
      # context relatif ke direktori kerja — jadi tidak pernah menunjuk root repo.
      #
      # Keenam target disebut eksplisit: worker/beat-worker/migrator memakai image
      # backend yang sama, tanpa ini image itu ter-build 4x.
      #
      # ponytail: tanpa cache layer — build ~25 menit, dan menit Actions gratis untuk
      # repo public. Tambahkan cache-from/to type=gha kalau waktunya mulai mengganggu.
      - name: Build & push (tag = commit sha)
        env:
          APP_RELEASE: ${{ github.sha }}
        run: |
          docker buildx bake -f docker-compose.yml -f docker-compose.ghcr.yml --push \
            web admin space live api proxy

      # Manifest copy, bukan rebuild — hitungan detik.
      - name: Geser tag `latest` ke build ini
        run: |
          for img in frontend space admin live backend proxy; do
            docker buildx imagetools create \
              -t "$REGISTRY/plane-$img:latest" \
              "$REGISTRY/plane-$img:${{ github.sha }}"
          done
